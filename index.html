<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Personal Finance Tracker</title>

    <link rel="stylesheet" href="style.css">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>


<div class="container">


    <!-- Header -->

    <header>

        <h1>Personal Finance Tracker</h1>

        <p>

            Record income and expenses.

            Stays on your device.

        </p>

    </header>



    <!-- Summary Cards -->

    <div class="summary">


        <div class="card">

            <div>

                <h3>Balance</h3>

                <h2 id="balance">

                    ₹0

                </h2>

            </div>

            <div class="icon">

                💳

            </div>

        </div>



        <div class="card">

            <div>

                <h3>Total Income</h3>

                <h2 id="income">

                    ₹0

                </h2>

            </div>

            <div class="icon">

                📈

            </div>

        </div>



        <div class="card">

            <div>

                <h3>Total Expenses</h3>

                <h2 id="expense">

                    ₹0

                </h2>

            </div>

            <div class="icon">

                📉

            </div>

        </div>


    </div>




    <!-- Add Transaction -->


    <section class="box">


        <h2>

            Add Transaction

        </h2>



        <label>

            Description

        </label>


        <input

            type="text"

            id="description"

            placeholder="e.g. Lunch at Saravana Bhavan"

        >




        <div class="row">


            <div>

                <label>

                    Amount (₹)

                </label>

                <input

                    type="number"

                    id="amount"

                    placeholder="0.00"

                >

            </div>



            <div>

                <label>

                    Date

                </label>

                <input

                    type="date"

                    id="date"

                >

            </div>



        </div>



        <label>

            Type

        </label>


        <div class="radio-group">


            <label>

                <input

                    type="radio"

                    name="type"

                    value="income"

                >

                Income

            </label>



            <label>

                <input

                    type="radio"

                    name="type"

                    value="expense"

                    checked

                >

                Expense

            </label>


        </div>





        <label>

            Category

        </label>


        <select id="category">


            <option>

                Food & Dining

            </option>


            <option>

                Transport

            </option>


            <option>

                Housing / Rent

            </option>


            <option>

                Health

            </option>


            <option>

                Entertainment

            </option>


            <option>

                Education

            </option>


            <option>

                Shopping

            </option>


            <option>

                Salary / Income

            </option>


            <option>

                Other

            </option>



        </select>




        <button

            class="add-btn"

            onclick="addTransaction()"

        >

            Add Transaction

        </button>


    </section>






    <!-- Pie Chart -->


    <section class="box">


        <h2>

            Spending by Category

        </h2>


        <canvas

            id="pieChart"

        >

        </canvas>


    </section>






    <!-- Transactions -->


    <section class="box">


        <div class="transaction-header">


            <h2>

                Transactions

            </h2>



            <div class="filters">


                <select id="typeFilter">

                    <option value="all">

                        All types

                    </option>


                    <option value="income">

                        Income

                    </option>


                    <option value="expense">

                        Expense

                    </option>


                </select>





                <select id="monthFilter">


                    <option value="all">

                        All months

                    </option>


                    <option value="0">

                        January

                    </option>


                    <option value="1">

                        February

                    </option>


                    <option value="2">

                        March

                    </option>


                    <option value="3">

                        April

                    </option>


                    <option value="4">

                        May

                    </option>


                    <option value="5">

                        June

                    </option>


                    <option value="6">

                        July

                    </option>


                    <option value="7">

                        August

                    </option>


                    <option value="8">

                        September

                    </option>


                    <option value="9">

                        October

                    </option>


                    <option value="10">

                        November

                    </option>


                    <option value="11">

                        December

                    </option>



                </select>


            </div>



        </div>




        <div id="transactionList">


        </div>




    </section>








    <!-- AI Budget Advisor -->


    <section class="box">


        <div class="advisor-header">


            <h2>

                ✨ AI Budget Advisor

            </h2>

<button

class="advisor-btn"

onclick="getAdvice()"

>

Get Advice

</button>


        </div>




        <p id="advice">


            Your monthly spending insights

            will appear here.

        </p>



    </section>



</div>



<script src="script.js"></script>


</body>

</html>
